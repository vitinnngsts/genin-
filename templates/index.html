<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genin Volantes e Insulfilm</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div class="hero-content">
        <h1>Seu carro novo de novo 🚗✨</h1>
        <p>Insulfilm • Volantes • Estética Automotiva</p>
        <p>📍 Papagaios e região</p>

        <a href="https://wa.me/5537999785428" class="btn">
            QUERO ORÇAMENTO 🔥
        </a>
    </div>
</section>

<!-- SLIDER -->
<section class="portfolio">
    <h2>Veja a transformação 👇</h2>

    <div class="portfolio-grid">

        {% for i in range(1,13) %}
        <div class="slider">

            <img src="{{ url_for('static', filename='foto_home/antes' ~ i ~ '.jpg') }}">
            <img src="{{ url_for('static', filename='foto_home/depois' ~ i ~ '.jpg') }}" class="after">

            <div class="line"></div>
            <div class="handle">⇆</div>

        </div>
        {% endfor %}

    </div>
</section>

<!-- WHATSAPP -->
<a href="https://wa.me/5537999785428" class="zap">WhatsApp</a>

<script>
document.querySelectorAll('.slider').forEach(slider => {

    const after = slider.querySelector('.after');
    const line = slider.querySelector('.line');
    const handle = slider.querySelector('.handle');

    let drag = false;

    const move = (x) => {
        const rect = slider.getBoundingClientRect();
        let pos = x - rect.left;

        if (pos < 0) pos = 0;
        if (pos > rect.width) pos = rect.width;

        const percent = (pos / rect.width) * 100;

        after.style.clipPath = `inset(0 ${100 - percent}% 0 0)`;
        line.style.left = percent + "%";
        handle.style.left = percent + "%";
    };

    slider.addEventListener('mousedown', () => drag = true);
    slider.addEventListener('mouseup', () => drag = false);
    slider.addEventListener('mousemove', (e) => {
        if (drag) move(e.clientX);
    });

    slider.addEventListener('touchstart', () => drag = true);
    slider.addEventListener('touchend', () => drag = false);
    slider.addEventListener('touchmove', (e) => {
        move(e.touches[0].clientX);
    });

});
</script>

</body>
</html>
