<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Genin Volantes</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- HERO -->
<section class="hero">
    <div class="overlay"></div>

    <div class="hero-content">
        <h1>Seu carro novo de novo 🚗</h1>
        <p>Estética automotiva profissional</p>

        <a href="https://wa.me/5537999785428" class="btn">
            Falar no WhatsApp
        </a>
    </div>
</section>

<!-- ANTES/DEPOIS BONITO -->
<section class="destaque">

    <div class="card-destaque">
        <img src="{{ url_for('static', filename='foto_home/depois1.jpg') }}">
        <div class="tag">DEPOIS</div>
    </div>

    <div class="card-destaque">
        <img src="{{ url_for('static', filename='foto_home/antes1.jpg') }}">
        <div class="tag antes">ANTES</div>
    </div>

</section>

<!-- GRID BONITO -->
<section class="portfolio">

    <h2>Transformações reais</h2>

    <div class="grid">

        {% for i in range(1,13) %}
        <div class="card">
            <img src="{{ url_for('static', filename='foto_home/depois' ~ i ~ '.jpg') }}">
        </div>
        {% endfor %}

    </div>

</section>

<!-- CTA -->
<section class="cta">
    <h2>Quer deixar seu carro assim?</h2>
    <a href="https://wa.me/5537999785428" class="btn">Chamar agora</a>
</section>

<a href="https://wa.me/5537999785428" class="zap">WhatsApp</a>

</body>
</html>
